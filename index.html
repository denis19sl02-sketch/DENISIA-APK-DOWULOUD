<button onclick="downloadAPK()" style="
    background: #000; 
    color: #00BFFF; 
    border: 3px solid #00BFFF; 
    padding: 20px; 
    font-family: 'Arial Black'; 
    box-shadow: 0 0 20px #00BFFF;
    cursor: pointer;
    text-transform: uppercase;">
    СКАЧАТЬ DENISIA LAUNCHER
</button>

<script>
function downloadAPK() {
    // Прямая ссылка на файл в твоем репозитории GitHub
    const rawUrl = 'https://github.com/denis19sl02-sketch/DENISIA-APK-DOWULOUD/raw/main/DENISIA%20Launcher%20(4).apk';

    const link = document.createElement('a');
    link.href = rawUrl;
    // Указываем имя файла при сохранении
    link.download = 'DENISIA_Launcher.apk';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
