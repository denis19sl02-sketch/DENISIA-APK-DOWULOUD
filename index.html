<button onclick="forceDownload()" style="
    background: #000; 
    color: #00BFFF; 
    border: 3px solid #00BFFF; 
    padding: 20px; 
    font-family: 'Arial Black'; 
    box-shadow: 0 0 20px #00BFFF;
    width: 100%;
    cursor: pointer;">
    СКАЧАТЬ ОБНОВЛЕНИЕ APK
</button>

<script>
function forceDownload() {
    // Ссылка на твой APK файл (лучше использовать прямую ссылку на GitHub или хостинг)
    const apkUrl = 'https://твой-сайт.com/DENISIA_Launcher_4.apk'; 

    // Создаем невидимую ссылку
    const downloadLink = document.createElement('a');
    downloadLink.href = apkUrl;
    
    // Этот атрибут важен для Android WebView
    downloadLink.target = '_blank'; 
    downloadLink.download = 'DENISIA_Launcher.apk';

    document.body.appendChild(downloadLink);
    downloadLink.click();
    document.body.removeChild(downloadLink);
}
</script>
